name: Build AMLEDS APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Analyze code
      run: flutter analyze --no-fatal-infos
    
    - name: Build APK
      run: flutter build apk --release --verbose 2>&1 | head -200
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: amleds-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30