name: amleds
description: Autonomous Machine Latency Evaluation & Diagnostic System - A network diagnostic tool for monitoring autonomous machines with static IPs

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.1
  cupertino_icons: ^1.0.6
  # Note: Using system ping binary instead of dart_ping for better Android compatibility

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
